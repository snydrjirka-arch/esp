<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Španělský kvíz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
#app { max-width: 560px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; color: #1a1a1a; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.tab { padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 13px; color: #666; transition: all 0.15s; }
.tab.active { background: #f0f0ee; color: #1a1a1a; border-color: #bbb; font-weight: 500; }
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.progress-bar { flex: 1; height: 4px; background: #e8e8e4; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #639922; border-radius: 2px; transition: width 0.4s; }
.progress-text { font-size: 13px; color: #888; min-width: 48px; text-align: right; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.stat { background: #f0f0ee; border-radius: 8px; padding: 10px 12px; text-align: center; }
.stat-n { font-size: 20px; font-weight: 500; }
.stat-l { font-size: 12px; color: #888; margin-top: 2px; }
.question-card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1.5rem; text-align: center; margin-bottom: 1.25rem; }
.q-word { font-size: 32px; font-weight: 500; color: #1a1a1a; margin-bottom: 0.75rem; }
.speak-row { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 28px; }
.speak-word { font-size: 14px; color: #aaa; font-style: italic; }
.speak-btn { background: #f0f0ee; border: 1px solid #ddd; border-radius: 20px; padding: 5px 14px; cursor: pointer; font-size: 13px; color: #666; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; text-decoration: none; }
.speak-btn:hover { border-color: #bbb; color: #1a1a1a; }
.options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.opt { padding: 14px 8px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 14px; color: #1a1a1a; text-align: center; transition: background 0.2s, border-color 0.2s, color 0.2s; line-height: 1.4; min-height: 64px; display: flex; align-items: center; justify-content: center; }
.opt:hover:not(.disabled) { background: #f0f0ee; border-color: #bbb; }
.opt.correct { border-color: #639922 !important; background: #EAF3DE !important; color: #3B6D11 !important; font-weight: 500; }
.opt.wrong { border-color: #E24B4A !important; background: #FCEBEB !important; color: #A32D2D !important; }
.opt.disabled { cursor: default; }
.feedback { text-align: center; font-size: 14px; min-height: 44px; color: #666; }
.feedback .ex { font-style: italic; color: #aaa; font-size: 13px; margin-top: 4px; }
.countdown { height: 3px; background: #e8e8e4; border-radius: 2px; overflow: hidden; margin-top: 1rem; }
.countdown-fill { height: 100%; background: #639922; border-radius: 2px; }
.done-box { text-align: center; padding: 2rem 1rem; }
.done-box h2 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
.done-box p { color: #666; font-size: 15px; margin-bottom: 1.5rem; }
.btn-restart { padding: 10px 24px; border-radius: 8px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 14px; font-weight: 500; color: #1a1a1a; }
.btn-restart:hover { background: #f0f0ee; }
</style>
</head>
<body>
<div id="app">
  <h1>🇪🇸 Španělský kvíz</h1>
  <div class="tabs" id="tabs"></div>
  <div id="main"></div>
</div>

<script>
const DATA = {
  "základní": [
    {es:"hola",cs:"ahoj",ex:"¡Hola! ¿Cómo estás?"},
    {es:"gracias",cs:"děkuji",ex:"Muchas gracias por tu ayuda."},
    {es:"por favor",cs:"prosím",ex:"Un café, por favor."},
    {es:"sí",cs:"ano",ex:"Sí, quiero."},
    {es:"no",cs:"ne",ex:"No, gracias."},
    {es:"buenos días",cs:"dobré ráno",ex:"Buenos días, señora."},
    {es:"buenas tardes",cs:"dobré odpoledne",ex:"Buenas tardes a todos."},
    {es:"buenas noches",cs:"dobrou noc",ex:"Buenas noches, hasta mañana."},
    {es:"adiós",cs:"na shledanou",ex:"Adiós, cuídate mucho."},
    {es:"hasta luego",cs:"uvidíme se",ex:"Hasta luego, amigo."},
    {es:"perdona",cs:"promiňte",ex:"Perdona, ¿dónde está el baño?"},
    {es:"no entiendo",cs:"nerozumím",ex:"Lo siento, no entiendo."},
  ],
  "čísla & čas": [
    {es:"uno",cs:"jedna",ex:"Uno, dos, tres."},
    {es:"dos",cs:"dva",ex:"Tengo dos hermanos."},
    {es:"tres",cs:"tři",ex:"Son las tres."},
    {es:"hoy",cs:"dnes",ex:"Hoy es lunes."},
    {es:"mañana",cs:"zítra",ex:"Mañana tengo trabajo."},
    {es:"ayer",cs:"včera",ex:"Ayer fui al cine."},
    {es:"ahora",cs:"teď",ex:"Ahora no puedo hablar."},
    {es:"tarde",cs:"pozdě",ex:"Es un poco tarde."},
    {es:"pronto",cs:"brzy",ex:"Hasta pronto."},
  ],
  "jídlo & pití": [
    {es:"la comida",cs:"jídlo",ex:"La comida está muy rica."},
    {es:"el agua",cs:"voda",ex:"¿Puedo tener agua?"},
    {es:"el café",cs:"káva",ex:"Me gusta mucho el café."},
    {es:"el vino",cs:"víno",ex:"Un vino tinto, por favor."},
    {es:"la cerveza",cs:"pivo",ex:"¿Tienes cerveza fría?"},
    {es:"la carne",cs:"maso",ex:"No como carne."},
    {es:"el pan",cs:"chléb",ex:"¿Me traes más pan?"},
    {es:"delicioso",cs:"výborné",ex:"¡Está muy delicioso!"},
    {es:"tengo hambre",cs:"mám hlad",ex:"Tengo hambre. ¿Comemos?"},
    {es:"tengo sed",cs:"mám žízeň",ex:"Tengo mucha sed."},
  ],
  "cestování": [
    {es:"el aeropuerto",cs:"letiště",ex:"El aeropuerto está lejos."},
    {es:"el hotel",cs:"hotel",ex:"¿Tienes una habitación libre?"},
    {es:"la estación",cs:"nádraží",ex:"La estación de tren, por favor."},
    {es:"el billete",cs:"jízdenka",ex:"Un billete de ida y vuelta."},
    {es:"a la derecha",cs:"doprava",ex:"Gira a la derecha."},
    {es:"a la izquierda",cs:"doleva",ex:"El banco está a la izquierda."},
    {es:"todo recto",cs:"rovně",ex:"Siga todo recto."},
    {es:"cerca",cs:"blízko",ex:"¿Está cerca?"},
    {es:"lejos",cs:"daleko",ex:"Está muy lejos."},
  ],
  "fráze": [
    {es:"¿cómo te llamas?",cs:"jak se jmenuješ?",ex:"Hola, ¿cómo te llamas?"},
    {es:"me llamo",cs:"jmenuji se",ex:"Me llamo Tomáš."},
    {es:"¿de dónde eres?",cs:"odkud jsi?",ex:"¿De dónde eres tú?"},
    {es:"¿cómo estás?",cs:"jak se máš?",ex:"¡Hola! ¿Cómo estás?"},
    {es:"estoy bien",cs:"jsem v pořádku",ex:"Estoy bien, gracias."},
    {es:"me gusta",cs:"líbí se mi",ex:"Me gusta el español."},
    {es:"no sé",cs:"nevím",ex:"Lo siento, no sé."},
    {es:"claro que sí",cs:"samozřejmě",ex:"¿Puedes ayudarme? ¡Claro que sí!"},
    {es:"¿cuánto cuesta?",cs:"kolik to stojí?",ex:"¿Cuánto cuesta esto?"},
  ]
};

const CATS = Object.keys(DATA);
let cat = CATS[0], deck = [], idx = 0, answered = false;
let score = {correct:0, wrong:0};
let allWords = [], countdownRaf = null;
let currentES = '';

function openForvo(text) {
  const word = encodeURIComponent(text.replace(/[¿¡?!]/g,'').trim());
  window.open('https://forvo.com/search/' + word + '/es/', '_blank');
}

function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function getDistractors(correct) {
  return shuffle(allWords.filter(w => w.cs !== correct.cs)).slice(0,2);
}

function startCat(c) {
  cat = c; clearAuto();
  allWords = [];
  CATS.forEach(k => allWords = allWords.concat(DATA[k]));
  deck = shuffle([...DATA[c]]);
  idx = 0; answered = false;
  score = {correct:0, wrong:0};
  renderTabs(); renderMain();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(c =>
    `<button class="tab${c===cat?' active':''}" onclick="startCat('${c}')">${c}</button>`
  ).join('');
}

function renderMain() {
  const el = document.getElementById('main');
  if (idx >= deck.length) { renderDone(el); return; }
  const card = deck[idx];
  const options = shuffle([card, ...getDistractors(card)]);
  const total = deck.length;
  const pct = Math.round(idx / total * 100);
  currentES = card.es;

  el.innerHTML = `
<div class="progress-row">
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  <span class="progress-text">${idx}/${total}</span>
</div>
<div class="stats">
  <div class="stat"><div class="stat-n" style="color:#3B6D11">${score.correct}</div><div class="stat-l">správně</div></div>
  <div class="stat"><div class="stat-n" style="color:#A32D2D">${score.wrong}</div><div class="stat-l">špatně</div></div>
</div>
<div class="question-card">
  <div class="q-word">${card.cs}</div>
  <div class="speak-row" id="speak-row" style="visibility:hidden">
    <span class="speak-word" id="speak-word"></span>
    <button class="speak-btn" onclick="openForvo(currentES)">🌐 výslovnost (forvo)</button>
  </div>
</div>
<div class="options">
  ${options.map((o,i) => `<button class="opt" id="opt${i}" data-cs="${o.cs}" data-es="${o.es}" onclick="choose(this,'${card.cs.replace(/'/g,"\\'")}','${card.es.replace(/'/g,"\\'")}','${card.ex.replace(/'/g,"\\'")}')">${o.es}</button>`).join('')}
</div>
<div class="feedback" id="fb"></div>
<div class="countdown" id="cdown" style="display:none"><div class="countdown-fill" id="cdown-fill" style="width:100%"></div></div>
`;
  answered = false;
}

function choose(btn, correctCs, correctEs, ex) {
  if (answered) return;
  answered = true;
  const isCorrect = btn.dataset.cs === correctCs;
  if (isCorrect) score.correct++; else score.wrong++;

  document.querySelectorAll('.opt').forEach(b => {
    b.classList.add('disabled');
    if (b.dataset.cs === correctCs) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  currentES = correctEs;
  const sr = document.getElementById('speak-row');
  const sw = document.getElementById('speak-word');
  if (sr) sr.style.visibility = 'visible';
  if (sw) sw.textContent = correctEs;

  document.getElementById('fb').innerHTML = isCorrect
    ? `<div style="color:#3B6D11;font-weight:500">Správně!</div><div class="ex">${ex}</div>`
    : `<div style="color:#A32D2D;font-weight:500">Správně: <em>${correctEs}</em></div><div class="ex">${ex}</div>`;

  startCountdown(4000);
}

function startCountdown(ms) {
  clearAuto();
  const fill = document.getElementById('cdown-fill');
  const bar = document.getElementById('cdown');
  if (!fill || !bar) return;
  bar.style.display = 'block';
  const start = performance.now();
  function frame(now) {
    const pct = Math.max(0, 100 - ((now - start) / ms) * 100);
    fill.style.width = pct + '%';
    if (now - start < ms) { countdownRaf = requestAnimationFrame(frame); }
    else { nextCard(); }
  }
  countdownRaf = requestAnimationFrame(frame);
}

function clearAuto() {
  if (countdownRaf) { cancelAnimationFrame(countdownRaf); countdownRaf = null; }
}

function nextCard() { clearAuto(); idx++; renderMain(); }

function renderDone(el) {
  const total = score.correct + score.wrong;
  const pct = total > 0 ? Math.round(score.correct / total * 100) : 0;
  el.innerHTML = `
<div class="done-box">
  <h2>Hotovo! 🎉</h2>
  <p>Kategorie <strong>${cat}</strong> — ${score.correct} z ${total} správně (${pct} %)</p>
  <div class="stats" style="max-width:280px;margin:0 auto 1.5rem;">
    <div class="stat"><div class="stat-n" style="color:#3B6D11">${score.correct}</div><div class="stat-l">správně</div></div>
    <div class="stat"><div class="stat-n" style="color:#A32D2D">${score.wrong}</div><div class="stat-l">špatně</div></div>
  </div>
  <button class="btn-restart" onclick="startCat('${cat}')">Zkusit znovu</button>
</div>`;
}

startCat(CATS[0]);
</script>
</body>
</html>
